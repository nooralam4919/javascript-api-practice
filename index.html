<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Weather App</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">

        <div class="heading">
            <h1>Simple Weather App</h1>
            <p>based on your location</p>
        </div>

        <div class="search-bar">
            <input id="input" type="text" placeholder="Enter your city name" />
            <button id="btn">Search</button>
        </div>

        <div class="info">

            <div class="temp">
                <h5 id="location"><span>My Location</span></h5>
                <h2 id="tempVal"><span>18°C</span></h2>
            </div>

            <div class="detail">
                <p>
                    <span>Wind</span>
                    <span id="windspeed">10 m/s</span>
                </p>

                <p>
                    <span>Pressure</span>
                    <span id="press">10 hPa</span>
                </p>

                <p>
                    <span>Humidity</span>
                    <span id="humidi">60%</span>
                </p>
            </div>

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
